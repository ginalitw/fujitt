<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 Fuji Rock My Timetable</title>
    <style>
        :root { --bg:#000; --surface:#1a1a1a; --text:#fff; --muted:#9ca3af; --border:#333; --accent:#3b82f6; }
        *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-tap-highlight-color:transparent;}
        body{background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
        header{padding:12px 16px;background:rgba(26,26,26,0.95);backdrop-filter:blur(10px);position:sticky;top:0;z-index:1000;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:10px;}
        .header-top{display:flex;justify-content:space-between;align-items:center;}
        h1{font-size:1.1rem;font-weight:700;white-space:nowrap;}
        .toolbar{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;}
        .btn{background:var(--surface);color:var(--text);border:1px solid var(--border);padding:5px 10px;border-radius:20px;font-size:0.8rem;cursor:pointer;display:flex;align-items:center;gap:3px;transition:.2s;}
        .btn-primary{background:var(--accent);border-color:var(--accent);font-weight:bold;}
        .btn-highlight{background:#eab308;border-color:#eab308;color:#000;font-weight:bold;}
        .btn-sync{background:#22c55e;border-color:#22c55e;font-weight:bold;}
        .day-selector{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;}
        .day-btn{background:transparent;color:var(--muted);border:none;font-size:0.95rem;font-weight:600;padding:4px 8px;cursor:pointer;white-space:nowrap;}
        .day-btn.active{color:var(--text);border-bottom:2px solid var(--accent);}
        .scroll-container{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;position:relative;}
        .tt-grid{display:grid;position:relative;padding-bottom:20px;}
        .time-col-bg{grid-column:1;grid-row:1/-1;position:sticky;left:0;z-index:90;background:var(--bg);border-right:1px solid var(--border);width:50px;min-width:50px;}
        .corner{grid-column:1;grid-row:1;position:sticky;top:0;left:0;z-index:200;background:var(--bg);border-bottom:2px solid var(--border);border-right:1px solid var(--border);width:50px;min-width:50px;}
        .stage-hdr{grid-row:1;position:sticky;top:0;z-index:100;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;text-align:center;border-bottom:2px solid;padding:8px 2px;}
        .time-lbl{grid-column:1;position:sticky;left:0;z-index:95;background:var(--bg);font-size:.7rem;color:var(--muted);text-align:right;padding-right:6px;transform:translateY(-8px);width:50px;min-width:50px;}
        .grid-line{grid-column:2/-1;border-top:1px solid var(--border);z-index:1;}
        .grid-line.half{border-top:1px dashed #222;}
        .ev{margin:0 3px;border-radius:5px;padding:5px;font-size:.75rem;z-index:10;display:flex;flex-direction:column;overflow:hidden;border-left:4px solid;background:var(--surface);transition:.2s;box-shadow:0 2px 5px rgba(0,0,0,.5);cursor:pointer;-webkit-user-select:none;user-select:none;}
        .ev:active{transform:scale(0.97);}
        .ev .ev-time{font-size:.65rem;opacity:.8;margin-bottom:1px;}
        .ev .ev-name{font-weight:700;line-height:1.2;word-break:break-word;}
        .ev.dimmed{opacity:.4;background:#111;border-left-width:2px;box-shadow:none;}
        .ev.dimmed .ev-name{font-weight:normal;color:var(--muted);}
        .ev.selected{box-shadow:0 0 0 2px #eab308,0 2px 8px rgba(234,179,8,.3);}
        .ev.selected::after{content:"⭐";position:absolute;top:3px;right:5px;font-size:.7rem;}
        .ev{position:relative;}
        .time-line{height:2px;background:#ff3b30;position:relative;z-index:50;pointer-events:none;display:none;}
        .time-dot{position:sticky;left:50px;width:10px;height:10px;background:#ff3b30;border-radius:50%;box-shadow:0 0 8px #ff3b30;animation:pulse 2s infinite;transform:translateY(-4px);}
        @keyframes pulse{0%{transform:scale(.95);box-shadow:0 0 0 0 rgba(255,59,48,.7)}70%{transform:scale(1);box-shadow:0 0 0 6px rgba(255,59,48,0)}100%{transform:scale(.95);box-shadow:0 0 0 0 rgba(255,59,48,0)}}
        .fab{position:fixed;bottom:20px;right:20px;background:var(--accent);color:white;width:46px;height:46px;border-radius:50%;display:flex;justify-content:center;align-items:center;font-size:1.3rem;box-shadow:0 4px 10px rgba(0,0,0,.5);z-index:900;border:none;cursor:pointer;}
        .list-view{display:none;padding:16px;flex-direction:column;gap:10px;}
        .list-item{display:flex;flex-direction:column;background:var(--surface);padding:10px;border-radius:8px;border-left:4px solid;box-shadow:0 2px 5px rgba(0,0,0,.3);cursor:pointer;}
        .list-item.dimmed{opacity:.4;background:#111;}
        .list-item.selected{box-shadow:0 0 0 2px #eab308;}
        .list-hdr{display:flex;justify-content:space-between;font-size:.8rem;color:var(--muted);margin-bottom:4px;}
        .list-title{font-size:1rem;font-weight:bold;}
        .modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:2000;align-items:center;justify-content:center;padding:20px;}
        .modal{background:var(--surface);width:100%;max-width:400px;border-radius:12px;padding:20px;border:1px solid var(--border);}
        .modal-title{font-size:1.1rem;font-weight:bold;margin-bottom:16px;text-align:center;}
        .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;}
        .chip{padding:8px 12px;border-radius:20px;border:1px solid;font-size:.85rem;background:transparent;color:var(--muted);cursor:pointer;transition:.2s;}
        .chip.active{color:#fff;font-weight:bold;}
        .modal-actions{display:flex;gap:10px;justify-content:center;}
        .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(34,197,94,.9);color:#fff;padding:10px 20px;border-radius:20px;font-size:.85rem;font-weight:bold;z-index:3000;display:none;animation:fadeInOut 2s ease;}
        @keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(10px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}85%{opacity:1}100%{opacity:0}}
        .count-badge{background:#eab308;color:#000;padding:2px 8px;border-radius:10px;font-size:.75rem;font-weight:bold;margin-left:6px;}
        body.ss-mode header,body.ss-mode .fab{display:none!important;}
        .watermark{display:none;text-align:center;font-size:1.2rem;font-weight:800;padding:16px 0;letter-spacing:2px;}
        body.ss-mode .watermark{display:block;}
        #loading{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:9999;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1rem;}
        /* ===== SS-MODE EXIT ===== */
        .ss-exit-btn{display:none;position:fixed;top:12px;right:12px;z-index:9999;background:rgba(20,20,20,.85);color:#fff;border:1px solid rgba(255,255,255,.2);padding:8px 16px;border-radius:20px;font-size:.85rem;cursor:pointer;backdrop-filter:blur(6px);box-shadow:0 2px 8px rgba(0,0,0,.5);}
        body.ss-mode .ss-exit-btn{display:block;}
        /* ===== SPOTIFY PANEL ===== */
        #sp-overlay{display:none;position:fixed;inset:0;z-index:1990;background:rgba(0,0,0,.45);}
        #sp-panel{position:fixed;bottom:0;left:0;right:0;background:#121212;border-radius:16px 16px 0 0;border-top:1px solid #282828;z-index:2000;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);}
        #sp-panel.open{transform:translateY(0);}
        .sp-drag{width:36px;height:4px;background:#444;border-radius:2px;margin:10px auto;}
        .sp-head{display:flex;justify-content:space-between;align-items:center;padding:4px 16px 10px;}
        .sp-title{font-size:1rem;font-weight:700;max-width:75%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;}
        .sp-x{background:none;border:none;color:#777;font-size:1.2rem;cursor:pointer;padding:4px 8px;}
        #sp-body{padding:0 12px 24px;}
        #sp-body iframe{width:100%;height:152px;border-radius:12px;border:none;display:block;}
        .sp-link{display:block;text-align:center;margin:8px auto;max-width:240px;background:#1DB954;color:#000;text-decoration:none;padding:12px;border-radius:25px;font-weight:700;font-size:.9rem;}
        .sp-connect{display:block;margin:8px auto;max-width:240px;background:#1DB954;color:#000;border:none;padding:12px;border-radius:25px;font-weight:700;font-size:.9rem;cursor:pointer;width:100%;}
        .sp-hint{color:#555;font-size:.72rem;text-align:center;margin-top:6px;}
        .sp-sel{padding:6px 12px;border-radius:16px;font-size:.78rem;font-weight:700;border:none;cursor:pointer;white-space:nowrap;transition:.15s;}
        .sp-sel.add{background:#eab308;color:#000;}
        .sp-sel.remove{background:#ef4444;color:#fff;}
        /* ===== SPOTIFY ICON ON EVENTS ===== */
        .ev-sp{position:absolute;bottom:2px;right:3px;font-size:.7rem;color:#1DB954;opacity:.5;background:none;border:none;cursor:pointer;padding:2px;line-height:1;z-index:11;}
        .ev-sp:active,.ev-sp:hover{opacity:1;}
        /* ===== POPULARITY GLOW ===== */
        .ev.glow-md{box-shadow:0 0 8px rgba(234,179,8,.3),0 2px 5px rgba(0,0,0,.5);}
        .ev.glow-hi{box-shadow:0 0 16px rgba(234,179,8,.6),0 2px 5px rgba(0,0,0,.5);}
        .ev.selected.glow-hi{box-shadow:0 0 0 2px #eab308,0 0 14px rgba(234,179,8,.5),0 2px 8px rgba(234,179,8,.3);}
        /* ===== CLEAN MODE ===== */
        body.clean-hdr .stage-hdr{opacity:0;pointer-events:none;}
        body.clean-hdr .corner{opacity:0;}
        body.clean-hdr .list-hdr span:last-child{display:none;}
    </style>
</head>
<body>
    <div id="loading">🤘 苗場資料讀取中...</div>
    <div class="toast" id="toast"></div>
    <button class="ss-exit-btn" onclick="toggleSS()">✕ 返回主畫面</button>
    <header>
        <div class="header-top">
            <h1>🎵 My Timetable</h1>
            <div class="toolbar">
                <button class="btn btn-highlight" onclick="toggleMode()" id="btn-mode">👤 專屬</button>
                <button class="btn" onclick="toggleView()" id="btn-view">📋</button>
                <button class="btn" onclick="openFilter()">⚙️</button>
                <button class="btn" onclick="toggleCleanHdr()" id="btn-hdr">🏷️</button>
                <button class="btn btn-sync" onclick="syncFromLine()">🔄 同步</button>
                <button class="btn btn-primary" onclick="toggleSS()">📸</button>
            </div>
        </div>
        <div class="day-selector" id="days"></div>
    </header>
    <div class="watermark" id="wm">2026 FUJI ROCK MY TT</div>
    <div class="scroll-container" id="scroll"><div class="tt-grid" id="grid"></div></div>
    <div class="list-view" id="listview"></div>
    <button class="fab" onclick="jumpNow()" id="fab">📍</button>
    <div class="modal-bg" id="filterModal"><div class="modal"><div class="modal-title">選擇舞台</div><div class="chips" id="filterChips"></div><div class="modal-actions"><button class="btn" onclick="allStages(true)">全選</button><button class="btn" onclick="allStages(false)">全不選</button><button class="btn btn-primary" onclick="applyFilter()">確定</button></div></div></div>
    <div id="sp-overlay" onclick="closeSpotify()"></div>
    <div id="sp-panel">
        <div class="sp-drag"></div>
        <div class="sp-head">
            <span class="sp-title" id="sp-aname"></span>
            <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
                <button id="sp-sel-btn" class="sp-sel add" onclick="spToggleSel()">⭐ 加入</button>
                <button class="sp-x" onclick="closeSpotify()">✕</button>
            </div>
        </div>
        <div id="sp-body"></div>
    </div>

<script>
// ====== CONFIG ======
var GAS_URL = "https://script.google.com/macros/s/AKfycbxrwj7fuanwtwa19rlCIuYdnl1kuaobuJOcoF5gWGHMSXIS0Pg3r6k0t5p3hSu0DnFmbw/exec";
var uid = new URLSearchParams(location.search).get("uid");

// ====== SPOTIFY CONFIG ======
// 步驟：前往 developer.spotify.com → 建立應用程式 → 取得 Client ID
// 在應用程式設定裡，把你的網頁 URL（不含 ?uid=...）加入 Redirect URIs
var SPOTIFY_CLIENT_ID = "b0898c67b1c842eb8343e7f83e810e76";
var _spTok = sessionStorage.getItem("sp_tok")||"";
var _spExp = parseInt(sessionStorage.getItem("sp_exp")||"0");
var _spPop = {}; // artistName -> popularity score (0-100)
var _spAid = {}; // artistName -> spotify artist id
var _spCurArtist = ""; // 目前面板顯示的藝人

var master = [], lineWanted = [], mySelection = [];
var DAYS = ["Day 1","Day 2","Day 3"], DAY_LABELS = ["Day 1 (7/24)","Day 2 (7/25)","Day 3 (7/26)"];
var curDay = DAYS[0], viewMode = "grid", schedMode = "personal";

var KNOWN = [
    {id:"GREEN",kw:"GREEN",name:"GREEN",color:"#22c55e"},
    {id:"WHITE",kw:"WHITE",name:"WHITE",color:"#e2e8f0"},
    {id:"RED",kw:"RED",name:"RED MARQUEE",color:"#ef4444"},
    {id:"FIELD",kw:"HEAVEN",name:"HEAVEN",color:"#eab308"},
    {id:"AVALON",kw:"AVALON",name:"AVALON",color:"#d946ef"},
    {id:"CRYSTAL",kw:"CRYSTAL",name:"CRYSTAL",color:"#8b5cf6"},
    {id:"PALACE",kw:"PALACE",name:"PALACE",color:"#f97316"},
    {id:"ROOKIE",kw:"ROOKIE",name:"ROOKIE",color:"#06b6d4"},
    {id:"DAY",kw:"DAY",name:"DAY DREAM",color:"#f43f5e"},
    {id:"PYRAMID",kw:"PYRAMID",name:"PYRAMID",color:"#10b981"},
    {id:"CAFE",kw:"CAFE",name:"CAFÉ",color:"#ec4899"}
];
var STAGES = [];

function toast(msg){var t=document.getElementById("toast");t.innerText=msg;t.style.display="block";setTimeout(function(){t.style.display="none";},2200);}

// ====== SPOTIFY ======
async function _spSearch(name){
    if(!_spTok||Date.now()>_spExp)return null;
    if(_spAid[name]!==undefined)return{id:_spAid[name],pop:_spPop[name]};
    try{
        var r=await fetch("https://api.spotify.com/v1/search?q="+encodeURIComponent(name)+"&type=artist&limit=1",{headers:{"Authorization":"Bearer "+_spTok}});
        if(r.status===401){_spTok="";sessionStorage.removeItem("sp_tok");return null;}
        var d=await r.json();
        var a=d.artists&&d.artists.items&&d.artists.items[0];
        if(a){_spAid[name]=a.id;_spPop[name]=a.popularity;return{id:a.id,pop:a.popularity};}
    }catch(e){}
    return null;
}
async function _spAuthStart(){
    var arr=crypto.getRandomValues(new Uint8Array(32));
    var chars=[];for(var i=0;i<arr.length;i++)chars.push(String.fromCharCode(arr[i]));
    var verifier=btoa(chars.join("")).replace(/\+/g,"-").replace(/\//g,"_").replace(/=/g,"");
    var buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(verifier));
    var hArr=Array.from(new Uint8Array(buf));
    var challenge=btoa(hArr.map(function(b){return String.fromCharCode(b);}).join("")).replace(/\+/g,"-").replace(/\//g,"_").replace(/=/g,"");
    sessionStorage.setItem("sp_ver",verifier);
    if(uid)sessionStorage.setItem("sp_uid",uid);
    var p=new URLSearchParams({client_id:SPOTIFY_CLIENT_ID,response_type:"code",redirect_uri:location.origin+location.pathname,code_challenge_method:"S256",code_challenge:challenge});
    location.href="https://accounts.spotify.com/authorize?"+p;
}
async function _spHandleCb(){
    var code=new URLSearchParams(location.search).get("code");
    if(!code||!SPOTIFY_CLIENT_ID)return;
    var ver=sessionStorage.getItem("sp_ver");if(!ver)return;
    sessionStorage.removeItem("sp_ver");
    try{
        var r=await fetch("https://accounts.spotify.com/api/token",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:new URLSearchParams({client_id:SPOTIFY_CLIENT_ID,grant_type:"authorization_code",code:code,redirect_uri:location.origin+location.pathname,code_verifier:ver})});
        var d=await r.json();
        if(d.access_token){_spTok=d.access_token;_spExp=Date.now()+(d.expires_in-60)*1000;sessionStorage.setItem("sp_tok",_spTok);sessionStorage.setItem("sp_exp",String(_spExp));}
    }catch(e){}
    var savedUid=sessionStorage.getItem("sp_uid")||"";
    history.replaceState({},"",location.pathname+(savedUid?"?uid="+savedUid:""));
    if(savedUid)uid=savedUid;
}
async function _spFetchAll(){
    if(!_spTok||!SPOTIFY_CLIENT_ID)return;
    var names=[...new Set(master.map(function(it){return it.name;}))];
    for(var i=0;i<names.length;i++){
        var n=names[i];
        if(_spPop[n]!==undefined)continue;
        var info=await _spSearch(n);
        if(info){
            document.querySelectorAll(".ev").forEach(function(el){if(el.dataset.artist===n)_applyGlow(el,info.pop);});
        }
        if(i<names.length-1)await new Promise(function(r){setTimeout(r,150);});
    }
}
function _applyGlow(el,pop){
    el.classList.remove("glow-md","glow-hi");
    if(pop>=75)el.classList.add("glow-hi");
    else if(pop>=50)el.classList.add("glow-md");
}
function _updateSpSelBtn(){
    var btn=document.getElementById("sp-sel-btn");if(!btn)return;
    var sel=isSelected(_spCurArtist);
    btn.textContent=sel?"❌ 移除排表":"⭐ 加入排表";
    btn.className="sp-sel "+(sel?"remove":"add");
}
function spToggleSel(){
    if(!_spCurArtist)return;
    toggleSelection(_spCurArtist);
    _updateSpSelBtn();
}
function openSpotify(name){
    _spCurArtist=name;
    document.getElementById("sp-aname").textContent=name;
    _updateSpSelBtn();
    var body=document.getElementById("sp-body");
    body.innerHTML='<div style="text-align:center;padding:16px;color:#9ca3af;font-size:.85rem">🎵 載入中…</div>';
    document.getElementById("sp-panel").classList.add("open");
    document.getElementById("sp-overlay").style.display="block";
    if(SPOTIFY_CLIENT_ID&&_spTok&&Date.now()<_spExp){
        _spSearch(name).then(function(info){
            if(info&&info.id){
                body.innerHTML='<iframe src="https://open.spotify.com/embed/artist/'+info.id+'?utm_source=generator&theme=0" frameborder="0" allowfullscreen allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>';
            }else{_spFallback(name,body);}
        });
    }else if(SPOTIFY_CLIENT_ID){
        body.innerHTML='<div style="text-align:center;padding:8px 0"><button class="sp-connect" onclick="_spAuthStart()">🔗 連結 Spotify 帳號</button><p class="sp-hint">連結後可在 Timetable 直接試聽藝人 30 秒預覽</p></div>';
    }else{_spFallback(name,body);}
}
function _spFallback(name,body){
    body.innerHTML='<a class="sp-link" href="https://open.spotify.com/search/'+encodeURIComponent(name)+'" target="_blank">🎵 在 Spotify 搜尋 '+name+'</a>';
}
function closeSpotify(){
    document.getElementById("sp-panel").classList.remove("open");
    document.getElementById("sp-overlay").style.display="none";
    setTimeout(function(){document.getElementById("sp-body").innerHTML="";},400);
}

// ====== Fetch Helper ======
function gasGet(url) {
  return fetch(url).then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); });
}

// ====== DATA ======
async function loadData(){
    if(!uid){document.getElementById("loading").innerText="❌ UID 遺失，請從 LINE 開啟";return;}
    try{
        // 同時發兩個請求，縮短等待時間
        var results=await Promise.all([
            gasGet(GAS_URL+"?action=getData&uid="+uid),
            gasGet(GAS_URL+"?action=getSelection&uid="+uid).catch(function(){return{selection:[]};})
        ]);
        var data=results[0],d2=results[1];
        if(data.error){document.getElementById("loading").innerText="❌ "+data.error;return;}
        master=data.fullSchedule||[];
        lineWanted=data.wantedList||[];
        mySelection=d2.selection||[];
        if(mySelection.length===0) mySelection=lineWanted.map(function(n){return n;});
        buildStages(); document.getElementById("loading").style.display="none"; initApp();
    }catch(e){document.getElementById("loading").innerText="❌ 連線失敗："+e.message;}
}

function buildStages(){
    var m=new Map();
    master.forEach(function(it){
        var sn=(it.stage||"").trim();if(!sn)return;
        var k=KNOWN.find(function(s){return sn.toUpperCase().includes(s.kw);});
        if(k){if(!m.has(k.id))m.set(k.id,{id:k.id,kw:k.kw,name:k.name,color:k.color,vis:true});}
        else{var sid="S_"+sn.replace(/\W/g,"_");if(!m.has(sid))m.set(sid,{id:sid,kw:sn,name:sn,color:"#64748b",vis:true});}
    });
    STAGES=Array.from(m.values());
}

function isSelected(name){return mySelection.indexOf(name.toLowerCase().trim())>=0;}

function toggleSelection(name){
    var key=name.toLowerCase().trim();
    var idx=mySelection.indexOf(key);
    if(idx>=0){mySelection.splice(idx,1);toast("❌ 已移除："+name);}
    else{mySelection.push(key);toast("⭐ 已加入："+name);}
    saveSelection(); render();
}

async function saveSelection(){
    try{await gasGet(GAS_URL+"?action=saveSelection&uid="+uid+"&selection="+encodeURIComponent(JSON.stringify(mySelection)));}catch(e){}
}

async function syncFromLine(){
    try{
        toast("🔄 同步中...");
        // Step1: 拉取 LINE 清單
        var d=await gasGet(GAS_URL+"?action=syncFromLine&uid="+uid);
        var lineList=(d.wantedList||[]).map(function(n){return n.toLowerCase().trim();});
        // Step2: 合併 LINE → TT（只加不刪）
        var added=0;
        lineList.forEach(function(n){if(mySelection.indexOf(n)<0){mySelection.push(n);added++;}});
        // Step3: 把合併後的 TT 清單推回 LINE（忽略失敗）
        gasGet(GAS_URL+"?action=pushToLine&uid="+uid+"&selection="+encodeURIComponent(JSON.stringify(mySelection))).catch(function(){});
        saveSelection(); render();
        toast("✅ 雙向同步完成！新增 "+added+" 組");
    }catch(e){toast("❌ 同步失敗");}
}

// ====== RENDER ======
function stageInfo(sn){
    if(!sn)return null;var u=sn.toUpperCase();
    var match=STAGES.find(function(s){return u.includes(s.kw.toUpperCase());});
    if(!match||!match.vis)return null;
    var active=STAGES.filter(function(s){return s.vis;});
    return{col:active.findIndex(function(s){return s.id===match.id;})+2,stage:match};
}

function timeToRow(ts){
    if(!ts||!ts.includes(":"))return 2;
    var p=ts.split(":"),h=parseInt(p[0]),m=parseInt(p[1]);
    if(isNaN(h)||isNaN(m))return 2;if(h<11)h+=24;return(h-11)*60+m+2;
}

function renderGrid(){
    var g=document.getElementById("grid");g.innerHTML="";
    var active=STAGES.filter(function(s){return s.vis;});
    if(!active.length){g.innerHTML='<div style="text-align:center;color:#666;padding:40px">沒有舞台</div>';return;}
    g.style.gridTemplateColumns="50px repeat("+active.length+",minmax(80px,1fr))";
    g.style.minWidth=(50+active.length*80)+"px";
    g.appendChild(Object.assign(document.createElement("div"),{className:"corner"}));
    active.forEach(function(s,i){var h=document.createElement("div");h.className="stage-hdr";h.style.gridColumn=i+2;h.style.borderBottomColor=s.color;h.style.color=s.color;h.innerText=s.name;g.appendChild(h);});
    var bg=document.createElement("div");bg.className="time-col-bg";g.appendChild(bg);
    for(var i=0;i<=36;i++){var hour=11+Math.floor(i/2),min=i%2===0?"00":"30",dh=hour>=24?(hour-24<10?"0"+(hour-24):hour-24):hour,r=i*30+2;
        var l=document.createElement("div");l.className="grid-line"+(min==="30"?" half":"");l.style.gridRow=r;l.style.gridColumn="2/span "+active.length;g.appendChild(l);
        if(min==="00"){var lb=document.createElement("div");lb.className="time-lbl";lb.style.gridRow=r;lb.innerText=dh+":"+min;g.appendChild(lb);}
    }
    // Events
    var evts=master.filter(function(it){
        if(it.day!==curDay)return false;
        if(schedMode==="personal")return isSelected(it.name);
        return true;
    });
    if(!evts.length&&schedMode==="personal"){var hint=document.createElement("div");hint.style.cssText="grid-column:2/-1;grid-row:30;text-align:center;color:#666;padding:20px;";hint.innerHTML="📭 切換到「🌐 全展」，<br>點選色塊 → 在面板中加入排表！";g.appendChild(hint);return;}
    evts.forEach(function(it){
        var si=stageInfo(it.stage);if(!si)return;
        var sel=isSelected(it.name);
        var bl=document.createElement("div");
        bl.className="ev"+(schedMode==="full"&&!sel?" dimmed":"")+(sel?" selected":"");
        bl.style.gridRow=timeToRow(it.start)+"/"+(it.end?timeToRow(it.end):timeToRow(it.start)+60);
        bl.style.gridColumn=si.col;bl.style.borderLeftColor=si.stage.color;
        bl.innerHTML='<div class="ev-time">'+it.start+" - "+(it.end||"?")+'</div><div class="ev-name">'+it.name+"</div>";
        bl.dataset.artist=it.name;
        if(_spPop[it.name]!==undefined)_applyGlow(bl,_spPop[it.name]);
        (function(n){bl.onclick=function(){openSpotify(n);};})(it.name);
        g.appendChild(bl);
    });
    updateTimeLine();
}

function renderList(){
    var c=document.getElementById("listview");c.innerHTML="";
    var evts=master.filter(function(it){if(it.day!==curDay)return false;if(schedMode==="personal")return isSelected(it.name);return true;});
    evts.sort(function(a,b){return timeToRow(a.start)-timeToRow(b.start);});
    if(!evts.length){c.innerHTML='<div style="text-align:center;color:#666;padding:40px">'+(schedMode==="personal"?"📭 點「🌐 全展」加入藝人":"📭 無資料")+"</div>";return;}
    evts.forEach(function(it){
        var si=stageInfo(it.stage);var color=si?si.stage.color:"#64748b";var sName=si?si.stage.name:it.stage;
        var sel=isSelected(it.name);
        var bl=document.createElement("div");
        bl.className="list-item"+(schedMode==="full"&&!sel?" dimmed":"")+(sel?" selected":"");
        bl.style.borderLeftColor=color;
        bl.innerHTML='<div class="list-hdr"><span>🕒 '+it.start+" - "+it.end+"</span><span style="color:'+color+';font-weight:bold">'+sName+'</span></div><div class="list-title">'+it.name+(sel?" ⭐":"")+'</div>';
        (function(n){bl.onclick=function(){openSpotify(n);};})(it.name);
        c.appendChild(bl);
    });
}

function render(){if(viewMode==="grid")renderGrid();else renderList();}

function updateTimeLine(){
    if(viewMode!=="grid")return;
    var now=new Date(),h=now.getHours(),m=now.getMinutes();if(h>=0&&h<5)h+=24;
    if(h>=11&&h<=29){var r=(h-11)*60+m+2;var tl=document.getElementById("tl");
        if(!tl){tl=document.createElement("div");tl.id="tl";tl.className="time-line";var d=document.createElement("div");d.className="time-dot";tl.appendChild(d);}
        var g=document.getElementById("grid"),active=STAGES.filter(function(s){return s.vis;});
        if(g&&active.length){g.appendChild(tl);tl.style.gridRow=r;tl.style.gridColumn="2/span "+active.length;tl.style.display="block";}
    }
}

// ====== CONTROLS ======
function toggleMode(){
    schedMode=schedMode==="personal"?"full":"personal";
    var b=document.getElementById("btn-mode");
    b.innerText=schedMode==="full"?"🌐 全展":"👤 專屬";
    if(schedMode==="full")b.classList.remove("btn-highlight");else b.classList.add("btn-highlight");
    if(schedMode==="full")toast("💡 點擊色塊可加入/移除自選");
    render();
}
function toggleView(){
    viewMode=viewMode==="grid"?"list":"grid";
    document.getElementById("btn-view").innerText=viewMode==="list"?"🎛️":"📋";
    document.getElementById("scroll").style.display=viewMode==="list"?"none":"block";
    document.getElementById("listview").style.display=viewMode==="list"?"flex":"none";
    document.getElementById("fab").style.display=viewMode==="list"?"none":"flex";
    render();
}
function changeDay(idx){
    curDay=DAYS[idx];
    document.querySelectorAll(".day-btn").forEach(function(b,i){b.classList.toggle("active",i===idx);});
    document.getElementById("wm").innerText="2026 FUJI ROCK - "+DAY_LABELS[idx];
    render();if(viewMode==="grid")document.getElementById("scroll").scrollTop=0;
}
function jumpNow(){
    var n=new Date(),h=n.getHours();if(h>=0&&h<5)h+=24;
    if(h>=11&&h<=29)document.getElementById("scroll").scrollTo({top:Math.max(0,((h-11)*60+n.getMinutes())*2-100),behavior:"smooth"});
    else toast("非演出時間");
}
function openFilter(){
    var c=document.getElementById("filterChips");c.innerHTML="";
    STAGES.forEach(function(s){var b=document.createElement("button");b.className="chip"+(s.vis?" active":"");b.style.borderColor=s.color;if(s.vis)b.style.backgroundColor=s.color;b.innerText=s.name;b.onclick=function(){s.vis=!s.vis;b.classList.toggle("active");b.style.backgroundColor=s.vis?s.color:"transparent";};c.appendChild(b);});
    document.getElementById("filterModal").style.display="flex";
}
function allStages(v){STAGES.forEach(function(s){s.vis=v;});openFilter();}
function applyFilter(){document.getElementById("filterModal").style.display="none";render();}
function toggleSS(){document.body.classList.toggle("ss-mode");}
function toggleCleanHdr(){
    var on=document.body.classList.toggle("clean-hdr");
    document.getElementById("btn-hdr").classList.toggle("btn-primary",on);
}

function initApp(){
    var dc=document.getElementById("days");dc.innerHTML="";
    DAY_LABELS.forEach(function(l,i){var b=document.createElement("button");b.className="day-btn"+(i===0?" active":"");b.innerText=l;b.onclick=function(){changeDay(i);};dc.appendChild(b);});
    // 自選數量顯示
    updateSelCount();
    changeDay(0);setInterval(updateTimeLine,60000);
    // 背景載入 Spotify 熱門度（需設定 SPOTIFY_CLIENT_ID 並完成連結）
    if(SPOTIFY_CLIENT_ID&&_spTok&&Date.now()<_spExp)setTimeout(_spFetchAll,2000);
}

function updateSelCount(){
    var b=document.getElementById("btn-mode");
    var cnt=mySelection.length;
    b.innerHTML=(schedMode==="full"?"🌐 全展":"👤 專屬")+'<span class="count-badge">'+cnt+"</span>";
}

window.onload=async function(){
    // Spotify PKCE callback（從 Spotify 跳轉回來時先完成 token 交換）
    if(SPOTIFY_CLIENT_ID&&new URLSearchParams(location.search).get("code")){
        await _spHandleCb();
    }
    loadData();
};
</script>
