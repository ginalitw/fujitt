<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 Fuji Rock My Timetable</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <style>
        /* ===== 夜（B 暖色節慶）/ 日（C 亮白極簡）===== */
        :root { --bg:#0f0a04; --surface:#1a1005; --text:#fef3c7; --muted:#a8a29e; --border:#2d1f08; --accent:#fbbf24; --header-bg:rgba(26,16,5,0.96); }
        :root.light { --bg:#f8fafc; --surface:#ffffff; --text:#0f172a; --muted:#94a3b8; --border:#e2e8f0; --accent:#2563eb; --header-bg:rgba(255,255,255,0.97); }
        *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-tap-highlight-color:transparent;}
        body{background:var(--bg);color:var(--text);height:100vh;height:100dvh;overflow:hidden;display:flex;flex-direction:column;}
        header{padding:12px 16px;background:var(--header-bg);backdrop-filter:blur(10px);position:sticky;top:0;z-index:1000;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:10px;}
        .header-top{display:flex;justify-content:space-between;align-items:center;}
        h1{font-size:1.1rem;font-weight:700;white-space:nowrap;}
        .toolbar{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;}
        .btn{background:var(--surface);color:var(--text);border:1px solid var(--border);padding:5px 10px;border-radius:20px;font-size:0.8rem;cursor:pointer;display:flex;align-items:center;gap:3px;transition:.2s;}
        .btn-primary{background:var(--accent);border-color:var(--accent);font-weight:bold;}
        .btn-highlight{background:#eab308;border-color:#eab308;color:#000;font-weight:bold;}
        .btn-sync{background:#22c55e;border-color:#22c55e;font-weight:bold;}
        /* ===== TOOLBAR DRAWER ===== */
        .menu-toggle{background:var(--surface);color:var(--text);border:1px solid var(--border);width:36px;height:36px;border-radius:50%;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s;}
        .menu-toggle.open{background:var(--accent);border-color:var(--accent);}
        .toolbar-drawer{display:none;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px 0 2px;animation:drawerIn .18s ease;}
        .toolbar-drawer.show{display:grid;}
        @keyframes drawerIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
        .tbr-btn{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:7px 4px;font-size:.72rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:.2s;line-height:1.2;}
        .tbr-btn .ico{font-size:1.1rem;line-height:1;}
        .tbr-btn.active{background:rgba(251,191,36,.14);border-color:var(--accent);color:var(--accent);}
        :root.light .tbr-btn.active{background:#eff6ff;border-color:#2563eb;color:#2563eb;}
        .tbr-btn.hl{background:#422006;border-color:#eab308;color:#eab308;}
        :root.light .tbr-btn.hl{background:#fef3c7;border-color:#f59e0b;color:#92400e;}
        .tbr-btn.green{background:#052e16;border-color:#22c55e;color:#22c55e;}
        /* ===== STATS BAR ===== */
        .stats-bar{display:none;background:var(--surface);border-bottom:1px solid var(--border);padding:5px 16px;font-size:.78rem;color:var(--muted);gap:12px;align-items:center;}
        .stats-bar.show{display:flex;}
        .stat-pill{display:inline-flex;align-items:center;gap:4px;}
        .stat-conflict{color:#ff3b30;font-weight:700;cursor:pointer;}
        .day-selector{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;}
        .day-btn{background:transparent;color:var(--muted);border:none;font-size:0.95rem;font-weight:600;padding:4px 8px;cursor:pointer;white-space:nowrap;}
        .day-btn.active{color:var(--text);border-bottom:2px solid var(--accent);}
        .scroll-container{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;position:relative;}
        .tt-grid{display:grid;position:relative;padding-bottom:20px;grid-auto-rows:2px;}
        .time-col-bg{grid-column:1;grid-row:1/-1;position:sticky;left:0;z-index:90;background:var(--bg);border-right:1px solid var(--border);width:50px;min-width:50px;}
        .stage-hdr-row{position:sticky;top:0;z-index:110;background:var(--bg);display:grid;}
        .corner{grid-column:1;position:sticky;top:0;left:0;z-index:200;background:var(--bg);border-bottom:2px solid var(--border);border-right:1px solid var(--border);width:50px;min-width:50px;}
        .stage-hdr{background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;text-align:center;border-bottom:2px solid;padding:8px 2px;}
        .time-lbl{grid-column:1;position:sticky;left:0;z-index:95;background:var(--bg);font-size:.7rem;color:var(--muted);text-align:right;padding-right:6px;transform:translateY(-8px);width:50px;min-width:50px;height:0;overflow:visible;align-self:start;}
        .grid-line{grid-column:2/-1;height:0;border-top:1px solid var(--border);z-index:1;}
        .grid-line.half{border-top:1px dashed var(--border);}
        .ev{margin:0 3px;border-radius:5px;padding:5px;font-size:.75rem;z-index:10;display:flex;flex-direction:column;overflow:hidden;border-left:4px solid;background:var(--surface);transition:background .2s,box-shadow .2s,opacity .2s;box-shadow:0 2px 5px rgba(0,0,0,.4);cursor:pointer;-webkit-user-select:none;user-select:none;}
        .ev:active{transform:scale(0.97);}
        .ev .ev-time{font-size:.65rem;opacity:.75;margin-bottom:1px;}
        .ev .ev-name{font-weight:700;line-height:1.2;word-break:break-word;}
        .ev.dimmed{box-shadow:none;border-left-width:2px;}
        .ev.dimmed .ev-name{font-weight:normal;opacity:.6;}
        .ev.dimmed .ev-time{opacity:.5;}
        .ev.selected{box-shadow:0 0 0 2px #eab308,0 4px 14px rgba(234,179,8,.4);border-left-width:5px;}
        .ev.selected::after{content:"⭐";position:absolute;top:3px;right:5px;font-size:.7rem;}
        .ev{position:relative;}
        .time-line{height:2px;background:#ff3b30;position:relative;z-index:50;pointer-events:none;display:none;}
        .time-dot{position:sticky;left:50px;width:10px;height:10px;background:#ff3b30;border-radius:50%;box-shadow:0 0 8px #ff3b30;animation:pulse 2s infinite;transform:translateY(-4px);}
        @keyframes pulse{0%{transform:scale(.95);box-shadow:0 0 0 0 rgba(255,59,48,.7)}70%{transform:scale(1);box-shadow:0 0 0 6px rgba(255,59,48,0)}100%{transform:scale(.95);box-shadow:0 0 0 0 rgba(255,59,48,0)}}
        .fab{position:fixed;bottom:20px;right:20px;background:var(--accent);color:white;width:46px;height:46px;border-radius:50%;display:flex;justify-content:center;align-items:center;font-size:1.3rem;box-shadow:0 4px 10px rgba(0,0,0,.5);z-index:900;border:none;cursor:pointer;}
        .list-view{display:none;padding:16px;flex-direction:column;gap:10px;flex:1;min-height:0;overflow-y:auto;}
        .list-item{display:flex;flex-direction:column;background:var(--surface);padding:10px;border-radius:8px;border-left:4px solid;box-shadow:0 2px 5px rgba(0,0,0,.3);cursor:pointer;}
        .list-item.dimmed{box-shadow:none;border-left-width:2px;opacity:.55;}
        .list-item.selected{box-shadow:0 0 0 2px #eab308;border-left-width:5px;}
        .list-hdr{display:flex;justify-content:space-between;font-size:.8rem;color:var(--muted);margin-bottom:4px;}
        .list-title{font-size:1rem;font-weight:bold;}
        .modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:2000;align-items:center;justify-content:center;padding:20px;}
        .modal{background:var(--surface);width:100%;max-width:400px;border-radius:12px;padding:20px;border:1px solid var(--border);}
        .modal-title{font-size:1.1rem;font-weight:bold;margin-bottom:16px;display:flex;align-items:center;justify-content:center;position:relative;}
        .modal-close-btn{position:absolute;right:0;background:none;border:none;font-size:1.1rem;color:var(--muted);cursor:pointer;padding:2px 6px;line-height:1;}
        .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
        .chip{padding:8px 12px;border-radius:20px;border:1px solid;font-size:.85rem;background:transparent;color:var(--muted);cursor:pointer;transition:.2s;}
        .chip.active{color:#fff;font-weight:bold;}
        /* ===== STAGE GROUP FILTER ===== */
        .filter-group-btns{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
        .filter-group-btn{flex:1;min-width:120px;border:1px solid var(--border);background:var(--bg);color:var(--text);border-radius:10px;padding:9px 8px;font-size:.8rem;cursor:pointer;text-align:center;transition:.2s;line-height:1.4;}
        .filter-group-btn.active{border-color:var(--accent);background:rgba(251,191,36,.12);color:var(--accent);font-weight:700;}
        :root.light .filter-group-btn.active{background:#eff6ff;border-color:#2563eb;color:#2563eb;}
        .filter-group-label{font-size:.65rem;letter-spacing:.3px;color:var(--muted);font-weight:700;text-transform:uppercase;padding:6px 0 4px;border-top:1px solid var(--border);margin-top:4px;display:block;}
        .filter-group-label:first-child{border-top:none;margin-top:0;}
        .modal-actions{display:flex;gap:10px;justify-content:center;}
        .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(34,197,94,.9);color:#fff;padding:10px 20px;border-radius:20px;font-size:.85rem;font-weight:bold;z-index:3000;display:none;animation:fadeInOut 2s ease;}
        @keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(10px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}85%{opacity:1}100%{opacity:0}}
        .count-badge{background:#eab308;color:#000;padding:2px 8px;border-radius:10px;font-size:.75rem;font-weight:bold;margin-left:6px;}
        body.ss-mode header,body.ss-mode .fab{display:none!important;}
        .watermark{display:none;text-align:center;font-size:1.2rem;font-weight:800;padding:16px 0;letter-spacing:2px;}
        body.ss-mode .watermark{display:block;}
        #loading{position:fixed;top:0;left:0;width:100%;height:100%;background:#0f0a04;z-index:9999;display:flex;align-items:center;justify-content:center;color:#fef3c7;font-size:1rem;}
        :root.light #loading{background:#f8fafc;color:#0f172a;}
        /* ===== SS-MODE EXIT ===== */
        .ss-exit-btn{display:none;position:fixed;top:12px;right:12px;z-index:9999;background:rgba(20,20,20,.85);color:#fff;border:1px solid rgba(255,255,255,.2);padding:8px 16px;border-radius:20px;font-size:.85rem;cursor:pointer;backdrop-filter:blur(6px);box-shadow:0 2px 8px rgba(0,0,0,.5);}
        body.ss-mode .ss-exit-btn{display:block;}
        /* ===== SPOTIFY PANEL ===== */
        #sp-overlay{display:none;position:fixed;inset:0;z-index:1990;background:rgba(0,0,0,.45);}
        #sp-panel{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:16px 16px 0 0;border-top:1px solid var(--border);z-index:2000;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);}
        #sp-panel.open{transform:translateY(0);}
        .sp-drag{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto;}
        .sp-head{display:flex;justify-content:space-between;align-items:center;padding:4px 16px 10px;}
        .sp-title{font-size:1rem;font-weight:700;max-width:75%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
        .sp-x{background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;padding:4px 8px;}
        #sp-body{padding:0 12px 24px;}
        #sp-body iframe{width:100%;height:152px;border-radius:12px;border:none;display:block;}
        .sp-link{display:block;text-align:center;margin:8px auto;max-width:240px;background:#1DB954;color:#000;text-decoration:none;padding:12px;border-radius:25px;font-weight:700;font-size:.9rem;}
        .sp-connect{display:block;margin:8px auto;max-width:240px;background:#1DB954;color:#000;border:none;padding:12px;border-radius:25px;font-weight:700;font-size:.9rem;cursor:pointer;width:100%;}
        .sp-hint{color:#555;font-size:.72rem;text-align:center;margin-top:6px;}
        .sp-sel{padding:6px 12px;border-radius:16px;font-size:.78rem;font-weight:700;border:none;cursor:pointer;white-space:nowrap;transition:.15s;}
        .sp-sel.add{background:#eab308;color:#000;}
        .sp-sel.remove{background:#ef4444;color:#fff;}
        /* ===== ARTIST INFO IN PANEL ===== */
        .sp-info{padding:4px 12px 8px;}
        .sp-img{width:100%;max-height:170px;object-fit:cover;border-radius:10px;margin-bottom:10px;display:block;}
        .sp-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
        .sp-tag{background:#2d1f08;border-radius:20px;padding:3px 10px;font-size:.7rem;color:#fbbf24;white-space:nowrap;}
        .sp-tag.genre{background:#451a03;color:#fde68a;font-weight:600;}
        .sp-intro{color:var(--text);font-size:.8rem;line-height:1.65;margin-bottom:10px;max-height:90px;overflow-y:auto;}
        .sp-extlinks{display:flex;gap:7px;margin-bottom:4px;}
        .sp-extlink{flex:1;text-align:center;background:#2d1f08;color:#a8a29e;text-decoration:none;padding:7px 4px;border-radius:8px;font-size:.72rem;font-weight:600;}
        .sp-extlink:active{background:#3d2a0a;color:#fef3c7;}
        .sp-divider{border:none;border-top:1px solid var(--border);margin:4px 0 10px;}
        /* light mode overrides for artist info panel */
        :root.light .sp-tag{background:#dbeafe;color:#1e40af;}
        :root.light .sp-tag.genre{background:#ede9fe;color:#5b21b6;}
        :root.light .sp-intro{color:#374151;}
        :root.light .sp-extlink{background:#f1f5f9;color:#475569;}
        :root.light .sp-extlink:active{background:#e2e8f0;color:#0f172a;}
        /* ===== SPOTIFY ICON ON EVENTS ===== */
        .ev-sp{position:absolute;bottom:2px;right:3px;font-size:.7rem;color:#1DB954;opacity:.5;background:none;border:none;cursor:pointer;padding:2px;line-height:1;z-index:11;}
        .ev-sp:active,.ev-sp:hover{opacity:1;}
        /* ===== POPULARITY GLOW ===== */
        .ev.glow-md{box-shadow:0 0 8px rgba(234,179,8,.3),0 2px 5px rgba(0,0,0,.5);}
        .ev.glow-hi{box-shadow:0 0 16px rgba(234,179,8,.6),0 2px 5px rgba(0,0,0,.5);}
        .ev.selected.glow-hi{box-shadow:0 0 0 2px #eab308,0 0 14px rgba(234,179,8,.5),0 2px 8px rgba(234,179,8,.3);}
        /* ===== CLEAN MODE ===== */
        body.clean-hdr .stage-hdr-row{opacity:0;pointer-events:none;}
        body.clean-hdr .stage-hdr{opacity:0;pointer-events:none;}
        body.clean-hdr .corner{opacity:0;}
        body.clean-hdr .list-hdr span:last-child{display:none;}
        body.clean-hdr .list-item{border-left-color:transparent !important;}
        body.clean-hdr .ev{border-left-color:transparent !important;}
        body.clean-hdr .sp-tag.stage{display:none;}
        /* ===== CONFLICT WARNING ===== */
        .ev.conflict{outline:2px solid #ff3b30;outline-offset:-2px;}
        .ev-warn{font-size:.6rem;color:#ff3b30;font-weight:700;margin-top:2px;}
        .list-item.conflict{outline:2px solid #ff3b30;}
        /* ===== NOW BANNER ===== */
        .now-banner{display:none;background:linear-gradient(90deg,#052e16,#14532d);border-bottom:1px solid #22c55e44;padding:6px 16px;overflow:hidden;position:relative;}
        .now-banner.show{display:block;}
        .now-inner{display:flex;gap:16px;align-items:center;animation:marquee 20s linear infinite;}
        .now-inner:hover{animation-play-state:paused;}
        @keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
        .now-label{color:#22c55e;font-size:.7rem;font-weight:700;white-space:nowrap;flex-shrink:0;}
        .now-item{color:#d1fae5;font-size:.72rem;white-space:nowrap;border-left:2px solid #22c55e;padding-left:8px;cursor:pointer;}
        .now-item strong{color:#fff;}
        /* ===== COUNTDOWN ===== */
        .ev-cd{font-size:.6rem;color:#6b7280;margin-top:2px;}
        .ev-cd.soon{color:#eab308;font-weight:700;}
        .ev-cd.live{color:#22c55e;font-weight:700;}
        .ev-cd.done{color:#4b5563;}
        /* ===== SCREENSHOT DOWNLOAD ===== */
        .ss-dl-btn{display:none;position:fixed;bottom:20px;left:20px;background:#22c55e;color:#000;width:46px;height:46px;border-radius:50%;align-items:center;justify-content:center;font-size:1.3rem;box-shadow:0 4px 10px rgba(0,0,0,.5);z-index:9998;border:none;cursor:pointer;}
        body.ss-mode .ss-dl-btn{display:flex;}
        /* ===== STAGE NAV（舞台模式導航列）===== */
        .stage-nav{display:none;align-items:center;padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--border);gap:8px;position:sticky;top:0;z-index:500;}
        .stage-nav.show{display:flex;}
        .stage-nav-center{flex:1;text-align:center;display:flex;flex-direction:column;gap:2px;}
        .stage-nav-name{font-weight:700;font-size:1rem;line-height:1.2;}
        .stage-nav-counter{font-size:.72rem;color:var(--muted);}
        .stage-nav-btn{background:var(--bg);color:var(--text);border:1px solid var(--border);padding:7px 14px;border-radius:10px;cursor:pointer;font-size:1rem;flex-shrink:0;transition:.15s;}
        .stage-nav-btn:active{background:var(--border);}
        /* ===== SUMMARY CARD ===== */
        .summary-card{display:none;background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;}
        .summary-card.show{display:block;}
        .summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:8px;}
        .summary-stat{text-align:center;background:rgba(255,255,255,.04);border-radius:8px;padding:6px 4px;}
        .summary-num{font-size:1.25rem;font-weight:800;color:#eab308;line-height:1;}
        .summary-lbl{font-size:.62rem;color:var(--muted);margin-top:2px;}
        .summary-days{display:flex;gap:4px;margin-top:6px;}
        .summary-day{flex:1;background:rgba(255,255,255,.04);border-radius:6px;padding:5px 4px;text-align:center;}
        .summary-day strong{display:block;font-size:.9rem;font-weight:800;color:var(--text);}
        .summary-day span{font-size:.6rem;color:var(--muted);}
        /* ===== NOW & NEXT VIEW ===== */
        #now-view{display:none;padding:12px 10px 80px;flex-direction:column;flex:1;min-height:0;overflow-y:auto;}
        #now-view.show{display:flex;}
        .now-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
        .now-card{background:var(--surface);border-radius:10px;padding:9px 10px;border-left:4px solid;box-shadow:0 2px 6px rgba(0,0,0,.25);cursor:pointer;}
        .now-card:active{transform:scale(.98);}
        .now-card-stage{font-size:.63rem;font-weight:700;margin-bottom:5px;letter-spacing:.3px;}
        .now-slot{padding:3px 0;}
        .now-slot+.now-slot{border-top:1px solid var(--border);margin-top:4px;padding-top:4px;}
        .now-badges{display:flex;gap:3px;margin-bottom:2px;flex-wrap:wrap;}
        .now-badge{font-size:.58rem;font-weight:700;padding:1px 5px;border-radius:6px;}
        .now-badge.live{background:#22c55e;color:#000;}
        .now-badge.next{background:#3b82f6;color:#fff;}
        .now-badge.sel{background:#eab308;color:#000;}
        .now-artist{font-size:.82rem;font-weight:700;line-height:1.2;word-break:break-word;}
        .now-time{font-size:.63rem;color:var(--muted);margin-top:1px;}
        /* ===== REMIND BUTTON ===== */
        .sp-remind{display:block;width:calc(100% - 24px);margin:0 12px 6px;background:var(--surface);color:var(--text);border:1px solid var(--border);padding:9px;border-radius:20px;font-size:.82rem;cursor:pointer;text-align:center;transition:.2s;}
        .sp-remind.set{background:rgba(251,191,36,.12);border-color:var(--accent);color:var(--accent);}
        :root.light .sp-remind.set{background:#eff6ff;border-color:#2563eb;color:#2563eb;}
        /* ===== HEADER PRETITLE ===== */
        .header-pretitle{font-size:.58rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);display:block;line-height:1;margin-bottom:2px;}
        /* ===== ADMIN MODE（設定管理已移至 admin.html）===== */
        /* ===== POSTER VIEW ===== */
        #poster-view{display:none;padding:10px 12px 80px;flex-direction:column;flex:1;min-height:0;overflow-y:auto;}
        #poster-view.show{display:flex;}
        .poster-festival-title{text-align:center;font-size:.65rem;font-weight:800;letter-spacing:3px;color:var(--muted);text-transform:uppercase;padding:8px 0 14px;}
        .poster-day-block{margin-bottom:18px;}
        .poster-day-label{font-size:.7rem;font-weight:800;color:var(--accent);letter-spacing:2px;text-transform:uppercase;padding:5px 10px 8px;border-bottom:1px solid var(--border);margin:0 -12px 8px;background:var(--header-bg);backdrop-filter:blur(8px);position:sticky;top:0;z-index:10;}
        .poster-stage-block{background:var(--surface);border-radius:10px;padding:10px 14px;margin-bottom:8px;border-left:4px solid;position:relative;overflow:hidden;}
        .poster-stage-name{font-size:.58rem;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:7px;}

function _hexToRgb(hex){
    hex=(hex||"#64748b").replace("#","");
    if(hex.length===3)hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
    return parseInt(hex.slice(0,2),16)+","+parseInt(hex.slice(2,4),16)+","+parseInt(hex.slice(4,6),16);
}
// 暗色主題下，極深色（如黑色）自動轉為可見的淺灰
function _dispColor(hex){
    var isDark=!document.documentElement.classList.contains("light");
    if(!isDark) return hex;
    var h=(hex||"#888").replace("#","");
    if(h.length===3)h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
    var r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);
    var lum=(0.299*r+0.587*g+0.114*b)/255;
    return lum<0.18?"#aaaaaa":hex;
}
function _matchStage(sn, kw){
    if(Array.isArray(kw)) return kw.some(function(k){ return sn.toUpperCase().includes(k.toUpperCase()); });
    return sn.toUpperCase().includes(kw.toUpperCase())||sn.includes(kw);
}
function _renderTimeGrid(g, colSpan){

        var hour=11+Math.floor(i/2),min=i%2===0?"00":"30",dh=hour>=24?(hour-24<10?"0"+(hour-24):String(hour-24)):String(hour),r=i*30+2;
        var l=document.createElement("div");l.className="grid-line"+(min==="30"?" half":"");l.style.gridRow=r;l.style.gridColumn=colSpan;g.appendChild(l);
        if(min==="00"){var lb=document.createElement("div");lb.className="time-lbl";lb.style.gridRow=r;lb.innerText=dh+":"+min;g.appendChild(lb);}
    }
}
function _buildEvBlock(it, stageColor, colVal){
    var sel=isSelected(it.name),isConflict=_conflicts.has(it.name+"|"+curDay);
    var inFocus=schedMode==="full"&&mySelection.length>0;
    var isDimmed=inFocus&&!sel;
    var dispC=_dispColor(stageColor);
    var rgb=_hexToRgb(dispC);
    // 選取：較深色塊；一般：淡色塊；dimmed：更淡
    var bgAlpha=sel?0.42:(isDimmed?0.07:0.18);
    // 計算格子列範圍，過濾超出格子的演出（如 10:20 → row 1402）
    var startRow=timeToRow(it.start);

    if(startRow>endRow||startRow>=_GRID_END_ROW)return null; // 超出格子範圍，跳過
    endRow=Math.min(endRow,_GRID_END_ROW);

    bl.style.gridRow=startRow+"/"+endRow;

async function loadTimetableSettings(){

function getDataPhase(){
    var override=_adminSettings.phase||"auto";
    if(override!=="auto")return override;
    var now=new Date();
    var jst=new Date(now.getTime()+(9*60-now.getTimezoneOffset())*60000);
    var d=jst.toISOString().slice(0,10);
    if(d>="2026-07-01")return "grid";  // 完整時間公布後 → 格子視圖
    return "list";                      // 目前測試中 / 六月初 → 列表視圖
}

// ====== CONFLICT DETECTION ======
var _conflicts = new Set();
function updateConflicts(){
    _conflicts.clear();
    if(!_adminSettings.conflict)return;
    ["Day 1","Day 2","Day 3"].forEach(function(day){
        var evts=master.filter(function(it){return it.day===day&&isSelected(it.name)&&it.start&&it.end;});
        for(var i=0;i<evts.length;i++){
            for(var j=i+1;j<evts.length;j++){
                var a=evts[i],b=evts[j];
                if(timeToRow(a.start)<timeToRow(b.end)&&timeToRow(b.start)<timeToRow(a.end)){
                    _conflicts.add(a.name+"|"+day);
                    _conflicts.add(b.name+"|"+day);
                }
            }
        }
    });
}

// ====== COUNTDOWN ======
var DAY_DATES={"Day 1":"2026-07-24","Day 2":"2026-07-25","Day 3":"2026-07-26"};
function getCountdown(day,start,end){
    if(!_adminSettings.countdown||!start||!DAY_DATES[day])return null;
    var ds=DAY_DATES[day];
    // 處理跨夜時間（如 26:00 = 隔天 02:00）
    function toDate(timeStr){
        var p=timeStr.split(":"),h=parseInt(p[0]),m=parseInt(p[1]||0);
        var d=new Date(ds+"T00:00:00+09:00");
        d.setHours(d.getHours()+h,m);return d;
    }
    var now=new Date(),sdt=toDate(start),edt=end?toDate(end):null;
    var diff=sdt-now;
    if(edt&&now>=sdt&&now<=edt)return{text:"🔴 演出中",cls:"live"};
    if(diff<0)return{text:"已結束",cls:"done"};
    var h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000);
    if(h<1)return{text:"⏰ "+m+"分後開演",cls:"soon"};
    if(h<24)return{text:"⏱ "+h+"h"+m+"m 後",cls:h<3?"soon":""};
    var days=Math.floor(h/24);
    return{text:"📅 "+days+"天後",cls:""};
}

// ====== SCREENSHOT DOWNLOAD ======
function isMobile(){
    return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) ||
           ('ontouchstart' in window && navigator.maxTouchPoints > 0 && window.innerWidth < 1024);
}
async function downloadScreenshot(){
    toast("📸 截圖產生中...");
    // 懶載入 html2canvas（只在點截圖時才下載，不阻塞初始渲染）
    if(!window.html2canvas){
        try{
            await new Promise(function(resolve,reject){
                var s=document.createElement("script");
                s.src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
                s.onload=resolve; s.onerror=reject;
                document.head.appendChild(s);
            });
        }catch(e){toast("❌ 截圖模組載入失敗");return;}
    }
    html2canvas(document.body,{backgroundColor:"#000",scale:2,useCORS:true,allowTaint:true,ignoreElements:function(el){return el.classList&&(el.classList.contains("ss-dl-btn")||el.id==="sp-overlay"||el.id==="sp-panel");}}).then(function(canvas){
        if(isMobile()){
            // 手機：優先 Web Share API（可存到相簿），否則顯示長按提示
            canvas.toBlob(function(blob){
                var file=new File([blob],"fujirock-timetable.png",{type:"image/png"});
                if(navigator.canShare && navigator.canShare({files:[file]})){
                    navigator.share({files:[file],title:"Fuji Rock 2026 My Timetable"})
                        .catch(function(){ _showImgOverlay(canvas.toDataURL("image/png")); });
                }else{
                    _showImgOverlay(canvas.toDataURL("image/png"));
                }
            },"image/png");
        }else{
            // 電腦：直接觸發下載，不跳 overlay
            var a=document.createElement("a");
            a.href=canvas.toDataURL("image/png");
            a.download="fujirock-timetable.png";
            a.click();
            toast("✅ 截圖已下載！");
        }
    }).catch(function(){toast("❌ 截圖失敗");});
}
function _showImgOverlay(imgUrl){
    // 手機專用：長按圖片儲存提示
    var ov=document.createElement("div");
    ov.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:12px;";
    ov.innerHTML=
        '<p style="color:#9ca3af;font-size:.85rem;text-align:center;line-height:1.7">📱 長按圖片 → <b style="color:#fff">儲存到相簿</b></p>'+
        '<img src="'+imgUrl+'" style="max-width:100%;max-height:68vh;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.8);">'+
        '<button onclick="this.closest(\'div[style*=fixed]\').remove()" style="background:#333;color:#fff;border:none;padding:10px 28px;border-radius:20px;font-size:.9rem;cursor:pointer;">✕ 關閉</button>';
    document.body.appendChild(ov);
}

// ====== 音樂祭模式：7/24~7/27 鎖定試聽，節省行動數據 ======
function isFestivalMode(){
    if(_adminSettings.festival)return true; // 管理員強制開啟
    var now = new Date();
    var jst = new Date(now.getTime() + (9*60 - now.getTimezoneOffset())*60000);
    var y = jst.getUTCFullYear(), m = jst.getUTCMonth()+1, d = jst.getUTCDate();
    return y===2026 && m===7 && d>=24 && d<=27;
}
async function loadSpotifyData(){
    // 先從 localStorage 取快取（Spotify ID 很少變動，用 24 小時 TTL）
    var SP_KEY="fujitt_spotify_v1";
    var spCached=_getCache(SP_KEY, 24*60*60*1000);
    if(spCached && spCached.aid){
        Object.assign(_spAid, spCached.aid);
        Object.assign(_spPop, spCached.pop||{});
        _spLoaded=true;
    }
    // 背景從 GAS 更新（不阻塞 UI）
    try{
        var data=await gasGet(GAS_URL+"?action=getSpotifyData");
        Object.keys(data).forEach(function(name){
            _spAid[name]=data[name].id;
            _spPop[name]=data[name].pop;
        });
        _spLoaded=true;
        _setCache(SP_KEY, {aid:_spAid, pop:_spPop});
    }catch(e){
        console.warn("Spotify 快取載入失敗，改用外連搜尋");
    }
}

function _buildArtistInfoHtml(name){
    var art=master.find(function(it){return it.name.toLowerCase().trim()===name.toLowerCase().trim();});
    var html='';
    if(!art)return html;
    var hasInfo=art.image||art.genre||art.intro||art.ig||art.yt;
    if(!hasInfo)return html;
    html+='<div class="sp-info">';
    // 圖片（M欄，尚未補上時自動隱藏）
    if(art.image) html+='<img class="sp-img" src="'+art.image+'" alt="'+name+'" loading="lazy" onerror="this.style.display=\'none\'">';
    // 標籤：曲風 / 日期 / 舞台（PLACEHOLDER_MODE 時隱藏舞台）
    var tags='';
    if(art.genre) tags+='<span class="sp-tag genre">🎵 '+art.genre+'</span>';
    if(art.day)   tags+='<span class="sp-tag">📅 '+art.day+'</span>';
    if(!PLACEHOLDER_MODE&&art.stage) tags+='<span class="sp-tag stage">🏟 '+art.stage.replace(/ STAGE$/i,'').replace(/ MARQUEE$/i,'')+'</span>';
    if(tags) html+='<div class="sp-tags">'+tags+'</div>';
    // 中文介紹（F欄）
    if(art.intro) html+='<div class="sp-intro">'+art.intro.replace(/\n/g,'<br>')+'</div>';
    // 外部連結（IG / YT）
    var links='';
    if(art.ig) links+='<a class="sp-extlink" href="'+art.ig+'" target="_blank">📸 Instagram</a>';
    if(art.yt) links+='<a class="sp-extlink" href="'+art.yt+'" target="_blank">▶️ YouTube</a>';
    if(links) html+='<div class="sp-extlinks">'+links+'</div>';
    html+='</div><hr class="sp-divider">';
    return html;
}

// ====== REMINDER SYSTEM ======
var _reminders = {};
function _restoreReminders(){
    var saved=JSON.parse(localStorage.getItem("fujitt_reminders")||"{}");
    var now=Date.now(),clean={};
    Object.keys(saved).forEach(function(key){
        var ms=saved[key]-now;
        if(ms>0){clean[key]=saved[key];_scheduleReminder(key,ms);}
    });
    localStorage.setItem("fujitt_reminders",JSON.stringify(clean));
}
function _scheduleReminder(key,ms){
    clearTimeout(_reminders[key]);
    _reminders[key]=setTimeout(function(){
        var saved=JSON.parse(localStorage.getItem("fujitt_reminders")||"{}");
        delete saved[key];
        localStorage.setItem("fujitt_reminders",JSON.stringify(saved));
        delete _reminders[key];
        var art=master.find(function(it){return it.name.toLowerCase().trim()===key;});
        var name=art?art.name:key;
        if(typeof Notification!=="undefined"&&Notification.permission==="granted"){
            new Notification("🎵 即將開演！",{body:name+" 還有 15 分鐘開演！"});
        }else{toast("🔔 "+name+" 還有 15 分鐘開演！");}
    },ms);
}
function toggleReminder(){
    if(!_spCurArtist)return;
    var key=_spCurArtist.toLowerCase().trim();
    var saved=JSON.parse(localStorage.getItem("fujitt_reminders")||"{}");
    var btn=document.getElementById("sp-remind-btn");
    if(saved[key]){
        clearTimeout(_reminders[key]);delete _reminders[key];delete saved[key];
        localStorage.setItem("fujitt_reminders",JSON.stringify(saved));
        if(btn){btn.textContent="🔔 開演前 15 分鐘提醒";btn.classList.remove("set");}
        toast("🔕 已取消提醒："+_spCurArtist);return;
    }
    var art=master.find(function(it){return it.name.toLowerCase().trim()===key;});
    if(!art||!art.start||!art.day||!DAY_DATES[art.day]){toast("❌ 演出時間未定，無法設定提醒");return;}
    var p=art.start.split(":"),h=parseInt(p[0]),m=parseInt(p[1]||0);
    var d=new Date(DAY_DATES[art.day]+"T00:00:00+09:00");
    d.setHours(d.getHours()+h,m-15);
    var ms=d.getTime()-Date.now();
    if(ms<0){toast("❌ 演出時間已過");return;}
    function doSchedule(){
        saved[key]=d.getTime();
        localStorage.setItem("fujitt_reminders",JSON.stringify(saved));
        _scheduleReminder(key,ms);
        if(btn){btn.textContent="🔕 取消提醒";btn.classList.add("set");}
        toast("🔔 已設定："+_spCurArtist+" 開演前 15 分鐘提醒");
    }
    if(typeof Notification==="undefined"){doSchedule();return;}
    if(Notification.permission==="granted"){doSchedule();}
    else if(Notification.permission!=="denied"){
        Notification.requestPermission().then(function(perm){if(perm==="granted")doSchedule();else toast("❌ 請允許通知權限");});
    }else{doSchedule();toast("⚠️ 通知權限已拒絕，改用站內提示");}
}
// ====== Fetch Helper ======
function gasGet(url) {
  return fetch(url).then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); });
}
// ── 日期格式 → "Day 1/2/3" 轉換 ───────────────────────
// Firestore 存的是 "2026-07-24"，timetable 用的是 "Day 1"
function _dateToDay(d){
    if(!d)return "";
    var s=String(d).trim();
    if(s==="Day 1"||s==="7/24"||s==="2026-07-24"||s==="2026/7/24"||s==="2026/07/24")return "Day 1";
    if(s==="Day 2"||s==="7/25"||s==="2026-07-25"||s==="2026/7/25"||s==="2026/07/25")return "Day 2";
    if(s==="Day 3"||s==="7/26"||s==="2026-07-26"||s==="2026/7/26"||s==="2026/07/26")return "Day 3";
    return s; // 其他格式原樣保留
}
// ── Firestore artists → master 格式轉換 helper ─────────
function _artistsSnapToMaster(snap){
    return snap.docs.map(function(d){
        var a=d.data();
        return {name:a.name||"",day:_dateToDay(a.date),start:a.startTime||"",
                end:a.endTime||"",stage:a.stage||"",code:a.code||"",genre:a.genre||"",
                intro:a.intro||"",image:a.imageUrl||a.image||"",ig:a.ig||"",yt:a.yt||""};
    });
}
// ── LINE code ↔ 藝人名稱轉換（利用已載入的 master，不需 GAS）──
function _codesToNames(codes){
    return (codes||[]).map(function(code){
        var a=master.find(function(it){return it.code===code;});
        return a?a.name.toLowerCase().trim():null;
    }).filter(Boolean);
}
function _namesToCodes(names){
    return (names||[]).map(function(n){
        var a=master.find(function(it){return it.name.toLowerCase().trim()===n;});
        return a?a.code:null;
    }).filter(Boolean);
}
// ── 背景靜默重整（快取命中後並行更新資料）─────────────────
function _refreshDataBg(){
    // artists + users 同時拉，不序列等待
    var p1=_db.collection("artists").get();
    var p2=uid?_db.collection("users").doc(uid).get():Promise.resolve(null);
    Promise.all([p1,p2]).then(function(results){
        var snap=results[0], uSnap=results[1];
        if(!snap||snap.empty)return;
        master=_artistsSnapToMaster(snap);
        if(uSnap&&uSnap.exists&&uSnap.data&&uSnap.data()){
            var codes=uSnap.data().favoriteList||[];
            lineWanted=_codesToNames(codes);
        }
        _setCache(_CACHE_KEY,{master:master,lineWanted:lineWanted});
        buildStages(); render();
    }).catch(function(){});
}
// ====== DATA ======
async function loadData(){
    if(!uid){document.getElementById("loading").innerText="❌ UID 遺失，請從 LINE 開啟";return;}

    // ── 快取命中：立即顯示，背景靜默更新 ──────────────────
    var cached   = _getCache(_CACHE_KEY, _CACHE_TTL);
    var selCache = _getCache(_SEL_KEY,   _CACHE_TTL);
    if(cached){
        master      = cached.master    || [];
        lineWanted  = cached.lineWanted|| [];
        mySelection = selCache ? (selCache.selection||[]) : [];
        if(mySelection.length===0) mySelection=lineWanted.map(function(n){return n;});
        buildStages();
        document.getElementById("loading").style.display="none";
        initApp();
        // ★ 修正：把 localStorage 的選擇同步寫回 Firestore
        // （手機 LINE 沒有 localStorage，必須靠 Firestore 取得資料）
        if(mySelection.length>0) saveSelection();
        _refreshDataBg(); // 背景靜默更新，不阻塞畫面
        return;
    }

    // ── 無快取：三個來源並行拉取（全部走 Firestore，不需 GAS）────
    try{
        var results=await Promise.all([
            _db.collection("artists").get(),
            _db.collection("users").doc(uid).get().catch(function(){return{exists:false};}),
            _db.collection("timetable").doc(uid).get().catch(function(){return{exists:false};})
        ]);
        var aSnap=results[0], uSnap=results[1], tSnap=results[2];
        if(!aSnap.docs) throw new Error("Firestore 讀取失敗");
        master = _artistsSnapToMaster(aSnap);
        // LINE 收藏：Firestore users/{uid}.favoriteList（code）→ 名稱
        var rawCodes=(uSnap.exists&&uSnap.data&&uSnap.data()&&uSnap.data().favoriteList)?uSnap.data().favoriteList:[];
        lineWanted=_codesToNames(rawCodes);
        var fsHadData = (tSnap.exists&&tSnap.data&&tSnap.data()&&tSnap.data().selection&&tSnap.data().selection.length>0);
        mySelection= fsHadData ? tSnap.data().selection : [];
        if(mySelection.length===0) mySelection=lineWanted.map(function(n){return n;});
        _setCache(_CACHE_KEY,{master:master,lineWanted:lineWanted});
        if(mySelection.length>0) _setCache(_SEL_KEY,{selection:mySelection});
        buildStages(); document.getElementById("loading").style.display="none"; initApp();
        // Firestore 是空的但從 LINE 清單初始化了資料 → 寫入 Firestore
        if(!fsHadData && mySelection.length>0) saveSelection();
    }catch(e){document.getElementById("loading").innerText="❌ 連線失敗："+e.message;}
}
function buildStages(){
    var m=new Map();
    master.forEach(function(it){
        var sn=(it.stage||"").trim();if(!sn)return;
        var k=KNOWN.find(function(s){return _matchStage(sn,s.kw);});
        if(k){if(!m.has(k.id))m.set(k.id,{id:k.id,kw:k.kw,name:k.name,color:k.color,group:k.group,vis:(k.vis!==false)});}
        else{var sid="S_"+sn.replace(/\W/g,"_");if(!m.has(sid))m.set(sid,{id:sid,kw:sn,name:sn,color:"#64748b",vis:true});}
    });
    // 按 KNOWN 固定順序排列，未知舞台附在最後
    var knownOrder=KNOWN.map(function(k){return k.id;});
    STAGES=Array.from(m.values()).sort(function(a,b){
        var ai=knownOrder.indexOf(a.id),bi=knownOrder.indexOf(b.id);
        if(ai<0&&bi<0)return 0;
        if(ai<0)return 1;
        if(bi<0)return -1;
        return ai-bi;
    });
}
function isSelected(name){return mySelection.indexOf(name.toLowerCase().trim())>=0;}
function toggleSelection(name){
    var key=name.toLowerCase().trim();
    var idx=mySelection.indexOf(key);
    if(idx>=0){mySelection.splice(idx,1);toast("❌ 已移除："+name);}
    else{mySelection.push(key);toast("⭐ 已加入："+name);}
    _setCache(_SEL_KEY,{selection:mySelection}); // 立即存 localStorage（下次秒開）
    saveSelection(); render();
}
function saveSelection(){
    // Firestore timetable/{uid} — 背景寫入，不阻塞 UI
    if(uid && _db){
        _db.collection("timetable").doc(uid).set({selection:mySelection},{merge:true}).catch(function(e){
            console.warn("Firestore saveSelection failed:", e);
        });
    }
}
async function syncFromLine(){
    try{
        toast("🔄 同步中...");
        // Step1: 直接讀 Firestore users/{uid}.favoriteList（code 陣列）
        var uSnap=await _db.collection("users").doc(uid).get();
        var codes=(uSnap.exists&&uSnap.data&&uSnap.data()&&uSnap.data().favoriteList)?uSnap.data().favoriteList:[];
        // Step2: code → 名稱（用 master，不需 GAS）
        var lineList=_codesToNames(codes);
        lineWanted=lineList.slice(); // 更新 lineWanted
        // Step3: 合併 LINE → TT（只加不刪）
        var added=0;
        lineList.forEach(function(n){if(mySelection.indexOf(n)<0){mySelection.push(n);added++;}});
        // Step4: TT 清單（名稱）→ code → 寫回 Firestore users/{uid}.favoriteList
        var newCodes=_namesToCodes(mySelection);
        await _db.collection("users").doc(uid).set({favoriteList:newCodes},{merge:true});
        saveSelection(); render();
        _setCache(_CACHE_KEY,{master:master,lineWanted:lineWanted});
        _setCache(_SEL_KEY,{selection:mySelection});
        toast("✅ 雙向同步完成！新增 "+added+" 組，LINE 已更新 "+newCodes.length+" 組");
    }catch(e){
        console.error("syncFromLine error:",e);
        toast("❌ 同步失敗："+e.message);
    }
}
// ====== RENDER ======
function stageInfo(sn){
    if(!sn)return null;
    var match=STAGES.find(function(s){return _matchStage(sn,s.kw);});
    if(!match||!match.vis)return null;
    var active=STAGES.filter(function(s){return s.vis;});
    return{col:active.findIndex(function(s){return s.id===match.id;})+2,stage:match};
}
var _GRID_END_ROW=1412; // 34:30 = 10:30+1day（涵蓋 PYRAMID 早場到 10:30）
function timeToRow(ts){
    if(!ts||!ts.includes(":"))return 2;
    var p=ts.split(":"),h=parseInt(p[0]),m=parseInt(p[1]);
    if(isNaN(h)||isNaN(m))return 2;if(h<11)h+=24;return(h-11)*60+m+2;
}
// 顯示用：將 25:30 → "01:30"，24:00 → "00:00"
function _fmtTime(ts){
    if(!ts||!ts.includes(":"))return ts||"";
    var p=ts.split(":"),h=parseInt(p[0]),m=p[1];
    if(h>=24)h-=24;
    return(h<10?"0"+h:String(h))+":"+m;
}
function renderGrid(){

// 時段分組（依 JST 時間段）
function getTimeslot(startStr){
    if(!startStr) return "其他";
    var h=parseInt(startStr.split(":")[0],10);
    if(h<5) h+=24; // 跨午夜
    if(h>=11&&h<14) return "☀️ 早場 (11:00~14:00)";
    if(h>=14&&h<18) return "🌤 午後 (14:00~18:00)";
    if(h>=18&&h<22) return "🌆 晚場 (18:00~22:00)";
    if(h>=22||h<5)  return "🌙 深夜 (22:00~)";
    return "其他";
}

function renderNowNext(){
    var c=document.getElementById("now-cards");c.innerHTML="";
    var active=STAGES.filter(function(s){return s.vis;});
    var now=new Date();
    // For ALL day mode, pick today's JST date
    var showDay=curDay;
    if(curDay==="ALL"){
        var jst=new Date(now.getTime()+(9*60-now.getTimezoneOffset())*60000);
        showDay=_dateToDay(jst.toISOString().slice(0,10))||DAYS[0];
    }
    var dayDate=DAY_DATES[showDay];
    function toMs(timeStr){
        if(!timeStr||!dayDate)return 0;
        var p=timeStr.split(":"),h=parseInt(p[0]),m=parseInt(p[1]||0);
        var d=new Date(dayDate+"T00:00:00+09:00");
        d.setHours(d.getHours()+h,m);return d.getTime();
    }
    active.forEach(function(stage){
        var evts=master.filter(function(it){
            if(it.day!==showDay)return false;
            var si=stageInfo(it.stage);return si&&si.stage.id===stage.id;
        }).sort(function(a,b){return timeToRow(a.start)-timeToRow(b.start);});
        if(!evts.length)return;
        var nowEvt=null,nextEvt=null,nowMs=now.getTime();
        if(isFestivalMode()&&dayDate){
            for(var i=0;i<evts.length;i++){
                var s=toMs(evts[i].start),e=evts[i].end?toMs(evts[i].end):s+5400000;
                if(nowMs>=s&&nowMs<e){nowEvt=evts[i];nextEvt=evts[i+1]||null;break;}
                if(nowMs<s&&!nextEvt){nextEvt=evts[i];}
            }
        }else{
            nextEvt=evts[0]||null;
        }
        if(!nowEvt&&!nextEvt)return;
        var card=document.createElement("div");
        card.className="now-card";card.style.borderLeftColor=stage.color;
        function slot(ev,badge,cls){
            var sel=isSelected(ev.name);
            return '<div class="now-slot">'
                +'<div class="now-badges"><span class="now-badge '+cls+'">'+badge+'</span>'+(sel?'<span class="now-badge sel">⭐</span>':'')+'</div>'
                +'<div class="now-artist">'+ev.name+'</div>'
                +'<div class="now-time">'+ev.start+(ev.end?' – '+ev.end:'')+'</div>'
                +'</div>';
        }
        var html='<div class="now-card-stage" style="color:'+stage.color+'">'+stage.name+'</div>';
        if(nowEvt) html+=slot(nowEvt,"🔴 NOW","live");
        if(nextEvt) html+=slot(nextEvt,"NEXT","next");
        card.innerHTML=html;
        var target=nowEvt||nextEvt;
        card.onclick=function(){openSpotify(target.name);};
        c.appendChild(card);
    });
    if(!c.children.length){
        c.innerHTML='<div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:40px">📭 無演出資料</div>';
    }
}

function renderPoster(){
    var c=document.getElementById("poster-view");c.innerHTML="";
    var isAll=curDay==="ALL";
    var daysToShow=isAll?DAYS:[curDay];
    var selected=master.filter(function(it){return isSelected(it.name);});
    if(!selected.length){
        c.innerHTML='<div class="poster-empty">📭 尚未選擇任何藝人<br><small style="font-size:.75rem">切換到列表 → 點藝人 → 加入排表</small></div>';
        return;
    }
    var title=document.createElement("div");
    title.className="poster-festival-title";
    title.textContent="FUJI ROCK FESTIVAL '26 · MY LINEUP";
    c.appendChild(title);
    daysToShow.forEach(function(day){
        var dayArtists=selected.filter(function(it){return it.day===day;});
        if(!dayArtists.length)return;
        var dayBlock=document.createElement("div");
        dayBlock.className="poster-day-block";
        var di=DAYS.indexOf(day);
        var dl=document.createElement("div");
        dl.className="poster-day-label";
        dl.textContent=(di>=0?DAY_LABELS[di]:day);
        dayBlock.appendChild(dl);
        // Group by stage (preserve KNOWN order)
        var stageMap={};
        dayArtists.forEach(function(it){
            var si=STAGES.find(function(s){return it.stage&&_matchStage(it.stage,s.kw);});
            var sid=si?si.id:(it.stage||"__unknown__");
            if(!stageMap[sid]){stageMap[sid]={stage:si,name:si?si.name:(it.stage||"未定舞台"),color:si?si.color:"#64748b",artists:[]};}
            stageMap[sid].artists.push(it);
        });
        // Sort stages by KNOWN order, then unknowns
        var knownOrder=KNOWN.map(function(k){return k.id;});
        var sids=Object.keys(stageMap).sort(function(a,b){
            var ia=knownOrder.indexOf(a),ib=knownOrder.indexOf(b);
            if(ia<0)ia=999;if(ib<0)ib=999;
            return ia-ib;
        });
        sids.forEach(function(sid){
            var sg=stageMap[sid];
            var sb=document.createElement("div");
            sb.className="poster-stage-block";
            sb.style.borderLeftColor=sg.color;
            // Stage name
            var sn=document.createElement("div");
            sn.className="poster-stage-name";
            sn.style.color=sg.color;
            sn.textContent=sg.name;
            sb.appendChild(sn);
            // Artists list sorted by popularity desc
            var arts=sg.artists.slice().sort(function(a,b){
                var pa=(_spPop[a.name]!==undefined?_spPop[a.name]:-1);
                var pb=(_spPop[b.name]!==undefined?_spPop[b.name]:-1);
                return pb-pa;
            });
            var al=document.createElement("div");
            al.className="poster-artists";
            arts.forEach(function(it,idx){
                var ad=document.createElement("div");
                var cls=idx===0?"p-main":idx<=2?"p-sub":"p-small";
                ad.className="poster-artist "+cls;
                ad.textContent=it.name;
                (function(n){ad.onclick=function(e){e.stopPropagation();openSpotify(n);};})(it.name);
                al.appendChild(ad);
            });
            sb.appendChild(al);
            dayBlock.appendChild(sb);
        });
        c.appendChild(dayBlock);
    });
}

function updateNowBanner(){
    var banner=document.getElementById("now-banner");
    if(PLACEHOLDER_MODE){banner.classList.remove("show");return;}
    var inner=document.getElementById("now-inner");
    if(!isFestivalMode()||!master.length){banner.classList.remove("show");return;}
    var now=new Date();
    var jst=new Date(now.getTime()+(9*60-now.getTimezoneOffset())*60000);
    var h=jst.getUTCHours(),m=jst.getUTCMinutes();
    var totalMin=h*60+m;
    // 找出所有正在演出的藝人
    var playing=master.filter(function(it){
        if(!it.start||!it.end)return false;
        var sh=parseInt(it.start.split(":")[0],10),sm=parseInt(it.start.split(":")[1],10);
        var eh=parseInt(it.end.split(":")[0],10),em=parseInt(it.end.split(":")[1],10);
        if(sh<5)sh+=24;if(eh<5)eh+=24; // 跨午夜
        var stMin=sh*60+sm,enMin=eh*60+em;
        var nowAdj=(h<5)?totalMin+1440:totalMin;
        return nowAdj>=stMin&&nowAdj<enMin;
    });
    if(!playing.length){banner.classList.remove("show");return;}
    // 建立跑馬燈內容（重複兩份實現循環）
    var items=playing.map(function(it){
        var si=stageInfo(it.stage);var sName=si?si.stage.name:(it.stage||"");
        return '<span class="now-item" onclick="changeDay(DAYS.indexOf(it.day||\'Day 1\'))">'
            +'<strong>'+it.name+'</strong>'+(sName?' @ '+sName:'')+'</span>';
    }).join('<span style="color:#166534;padding:0 8px">·</span>');
    // 跑馬燈需要重複內容
    inner.innerHTML='<span class="now-label">🟢 NOW</span>'+items
        +'<span style="padding:0 20px"></span>'
        +'<span class="now-label">🟢 NOW</span>'+items;
    banner.classList.add("show");
}

function jumpNow(){
    var n=new Date(),h=n.getHours();if(h>=0&&h<5)h+=24;
    if(h>=11&&h<=29)document.getElementById("scroll").scrollTo({top:Math.max(0,((h-11)*60+n.getMinutes())*2-100),behavior:"smooth"});
    else toast("非演出時間");
}
var _filterSnapshot=[];
function openFilter(){
    _filterSnapshot=STAGES.map(function(s){return s.vis;});
    _renderFilterGroupBtns();
    _renderFilterChips();
    document.getElementById("filterModal").style.display="flex";
}
function _renderFilterGroupBtns(){
    var wrap=document.getElementById("filterGroupBtns");wrap.innerHTML="";
    STAGE_GROUPS.forEach(function(g){
        var inGroup=STAGES.filter(function(s){return s.group===g.key;});
        var allOn=inGroup.every(function(s){return s.vis;});
        var btn=document.createElement("button");
        btn.className="filter-group-btn"+(allOn?" active":"");
        btn.innerHTML='<strong>'+g.label+'</strong><br><span style="font-size:.63rem;opacity:.65">'+g.desc+'</span>';
        btn.onclick=function(){
            var turnOn=!allOn;
            inGroup.forEach(function(s){s.vis=turnOn;});
            _renderFilterGroupBtns();_renderFilterChips();
        };
        wrap.appendChild(btn);
    });
}
function _renderFilterChips(){
    var c=document.getElementById("filterChips");c.innerHTML="";
    STAGE_GROUPS.forEach(function(g){
        var inGroup=STAGES.filter(function(s){return s.group===g.key;});
        if(!inGroup.length)return;
        var lbl=document.createElement("span");lbl.className="filter-group-label";lbl.innerText=g.label;c.appendChild(lbl);
        var row=document.createElement("div");row.className="chips";
        inGroup.forEach(function(s){
            var b=document.createElement("button");
            b.className="chip"+(s.vis?" active":"");
            b.style.borderColor=s.color;
            if(s.vis)b.style.backgroundColor=s.color;
            b.innerText=s.name;
            b.onclick=function(){
                s.vis=!s.vis;
                b.classList.toggle("active");
                b.style.backgroundColor=s.vis?s.color:"transparent";
                _renderFilterGroupBtns();
            };
            row.appendChild(b);
        });
        c.appendChild(row);
    });
    var ungrouped=STAGES.filter(function(s){return !s.group;});
    if(ungrouped.length){
        var lbl2=document.createElement("span");lbl2.className="filter-group-label";lbl2.innerText="其他";c.appendChild(lbl2);
        var row2=document.createElement("div");row2.className="chips";
        ungrouped.forEach(function(s){
            var b=document.createElement("button");
            b.className="chip"+(s.vis?" active":"");
            b.style.borderColor=s.color;if(s.vis)b.style.backgroundColor=s.color;
            b.innerText=s.name;
            b.onclick=function(){s.vis=!s.vis;b.classList.toggle("active");b.style.backgroundColor=s.vis?s.color:"transparent";_renderFilterGroupBtns();};
            row2.appendChild(b);
        });
        c.appendChild(row2);
    }
}
function allStages(v){STAGES.forEach(function(s){s.vis=v;});_renderFilterGroupBtns();_renderFilterChips();}
function applyFilter(){document.getElementById("filterModal").style.display="none";render();}
function closeFilter(){STAGES.forEach(function(s,i){s.vis=_filterSnapshot[i];});document.getElementById("filterModal").style.display="none";}
function toggleSS(){document.body.classList.toggle("ss-mode");}


function initApp(){
    var dc=document.getElementById("days");dc.innerHTML="";
    // 全覽 button
    var allBtn=document.createElement("button");allBtn.className="day-btn";allBtn.innerText="全覽";allBtn.dataset.day="ALL";allBtn.onclick=function(){changeDay("ALL");};dc.appendChild(allBtn);
    DAY_LABELS.forEach(function(l,i){var b=document.createElement("button");b.className="day-btn"+(i===0?" active":"");b.innerText=l;b.dataset.day=DAYS[i];b.onclick=function(){changeDay(i);};dc.appendChild(b);});
    updateSelCount();
    _restoreReminders();
    // 根據資料階段設定預設視圖（明確設 list 才切回 list，其餘保持 grid）
    var phase=getDataPhase();
    if(phase==="list") viewMode="list";
    changeDay(0);
    // 舞台模式：左右滑切換舞台
    var _tx=0,_ty=0;
    document.getElementById("scroll").addEventListener("touchstart",function(e){_tx=e.changedTouches[0].clientX;_ty=e.changedTouches[0].clientY;},{passive:true});
    document.getElementById("scroll").addEventListener("touchend",function(e){
        if(viewMode!=="stage")return;
        var dx=e.changedTouches[0].clientX-_tx,dy=e.changedTouches[0].clientY-_ty;
        if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>55){dx<0?nextStage():prevStage();}
    },{passive:true});
    setInterval(updateTimeLine,60000);
    setInterval(updateAllCountdowns,30000);
    updateNowBanner();
    setInterval(updateNowBanner,60000);
    // Spotify 快取已於 window.onload 預載，這裡直接套用光暈
    if(_spLoaded)setTimeout(_applyAllGlows,300);
    // 初始化管理員功能
    initAdmin();
    // 依設定同步工具列顯示
    syncToolbarVisibility();
    // sp-panel 向下滑動收合
    (function(){
        var panel=document.getElementById("sp-panel");
        var startY=0,startT=0,dragging=false;
        panel.addEventListener("touchstart",function(e){
            if(!panel.classList.contains("open"))return;
            startY=e.touches[0].clientY;startT=Date.now();dragging=true;
            panel.style.transition="none";
        },{passive:true});
        panel.addEventListener("touchmove",function(e){
            if(!dragging)return;
            var dy=e.touches[0].clientY-startY;
            if(dy>0)panel.style.transform="translateY("+dy+"px)";
        },{passive:true});
        panel.addEventListener("touchend",function(e){
            if(!dragging)return;dragging=false;
            var dy=e.changedTouches[0].clientY-startY;
            var dt=Date.now()-startT;
            panel.style.transition="";panel.style.transform="";
            if(dy>80||(dy>30&&dt<250))closeSpotify();
            else panel.style.transform="";
        },{passive:true});
    })();
}
// ====== TOOLBAR TOGGLE ======
function toggleToolbar(){
    var d=document.getElementById("toolbar-drawer");
    var t=document.getElementById("menu-toggle-btn");
    var show=!d.classList.contains("show");
    d.classList.toggle("show",show);
    t.classList.toggle("open",show);
    t.innerHTML=show?"✕":"☰";
}
// ====== STATS BAR ======
function updateSelCount(){
    var cnt=mySelection.length;
    // 更新 toolbar drawer 按鈕
    var tm=document.getElementById("tbr-mode");
    if(tm) tm.innerHTML='<span class="ico">'+(schedMode==="full"?"🌐":"👤")+'</span>'+(schedMode==="full"?"全展":"專屬");
    if(schedMode==="full") tm&&tm.classList.remove("hl"); else tm&&tm.classList.add("hl");
    // 統計列
    document.getElementById("stat-count").innerText=cnt;
    var conflictN=_conflicts.size>0?Math.round(_conflicts.size/2):0;
    var cw=document.getElementById("stat-conflict-wrap");
    cw.style.display=conflictN>0?"inline-flex":"none";
    document.getElementById("stat-conflict").innerText=conflictN;
    // 有選取時才顯示統計列
    var sb=document.getElementById("stats-bar");
    sb.classList.toggle("show",cnt>0);
}

// ====== SCROLL TO FIRST CONFLICT ======
function scrollToFirstConflict(){
    var first=document.querySelector(".conflict");
    if(first){first.scrollIntoView({behavior:"smooth",block:"center"});}
    else{toast("⚠️ 請切換到對應日期查看衝堂");}
}
// ====== DAY / NIGHT THEME ======
function initTheme(){
    var saved=localStorage.getItem("fujitt_theme")||"dark";
    if(saved==="light"){
        document.documentElement.classList.add("light");
        var ico=document.getElementById("theme-ico");
        if(ico) ico.textContent="🌙";
    }
}
function toggleTheme(){
    var isLight=document.documentElement.classList.toggle("light");
    localStorage.setItem("fujitt_theme",isLight?"light":"dark");
    var ico=document.getElementById("theme-ico");
    if(ico) ico.textContent=isLight?"🌙":"☀️";
}
window.onload=function(){
    initTheme();
    // 音樂祭期間顯示節流提示橫幅
    if(isFestivalMode()){
        var banner=document.createElement("div");
        banner.style.cssText="background:#854d0e;color:#fef08a;text-align:center;padding:6px 12px;font-size:.78rem;font-weight:700;position:sticky;top:0;z-index:1001;";
        banner.innerHTML="🎪 音樂祭進行中！試聽已暫停以節省行動數據 · 加入／移除排表功能正常使用";
        document.body.insertBefore(banner,document.body.firstChild);
    }
    // ① 立即從 localStorage 套用上次快取的設定（0ms）
    var cachedSettings=_getCache(_SETTINGS_KEY, _SETTINGS_TTL);
    if(cachedSettings&&cachedSettings.dc){ _applyDisplayConfig(cachedSettings.dc); }

    // ② 立即開始載入主資料（不等設定或 Spotify）
    loadData();

    // ③ 背景拉最新設定；若與快取不同則重新套用工具列
    loadTimetableSettings().then(function(){
        // 若 app 已初始化，重新同步顯示設定
        if(document.getElementById("loading").style.display==="none"){
            syncToolbarVisibility(); render();
        }
    });

    // ④ Spotify 完全背景，不阻塞任何東西
    loadSpotifyData();
};
</script>
